[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[dev]
  framework = "#custom"
  command = "npm run dev"
  port = 8080
  targetPort = 3000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/webhook/:token"
  to = "/.netlify/functions/telegram"
  status = 200
  force = true

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }
